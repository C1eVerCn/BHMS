data:
  csv_path: data/processed/kaggle/kaggle_cycle_summary.csv
  seq_len: 24
  feature_columns:
    - voltage_mean
    - voltage_std
    - voltage_min
    - voltage_max
    - current_mean
    - current_std
    - temperature_mean
    - temperature_std
    - temperature_rise_rate
    - capacity
    - cycle_number
model:
  d_model: 48
  xlstm_layers: 1
  xlstm_heads: 4
  transformer_layers: 1
  transformer_heads: 4
  transformer_ff_mult: 4
  fusion_dim: 48
  dropout: 0.1
  max_rul: 100
  transformer_parallel: true
  pooling_mode: attention
  pooling_hidden_dim: 32
training:
  num_epochs: 30
  batch_size: 8
  learning_rate: 0.0003
  weight_decay: 0.001
  patience: 10
  model_version: kaggle-hybrid-v2-parallel-attn
