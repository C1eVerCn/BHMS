data:
  csv_path: data/processed/nasa/nasa_cycle_summary.csv
  seq_len: 30
  feature_columns:
    - voltage_mean
    - voltage_std
    - voltage_min
    - voltage_max
    - current_mean
    - current_std
    - temperature_mean
    - temperature_std
    - temperature_rise_rate
    - capacity
    - cycle_number
model:
  d_model: 64
  xlstm_layers: 1
  xlstm_heads: 4
  transformer_layers: 1
  transformer_heads: 8
  transformer_ff_mult: 4
  fusion_dim: 64
  dropout: 0.1
  max_rul: 220
  transformer_parallel: true
  pooling_mode: attention
  pooling_hidden_dim: 32
training:
  num_epochs: 40
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.001
  patience: 12
  model_version: nasa-hybrid-v2-parallel-attn
